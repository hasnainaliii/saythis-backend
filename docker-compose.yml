

name: saythis

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saythis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-saythis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-saythis} -d ${POSTGRES_DB:-saythis}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  # ── Migrations (one-shot; exits 0 on success) ──────────────────────────────
  migrate:
    image: migrate/migrate:v4.18.1
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=${DATABASE_URL}"
      - "up"
    networks:
      - backend

  # ── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT:-:8080}
      APP_ENV: ${APP_ENV:-production}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      CLOUDINARY_URL: ${CLOUDINARY_URL}
    ports:
      - "${HOST_PORT:-8080}:${APP_PORT:-8080}"
    mem_limit: 128m
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
