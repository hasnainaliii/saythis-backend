# HTTP — serves the app and handles Certbot domain verification.
# This is the initial config. After acquiring SSL certificates,
# replace this file with the HTTPS version from docs/DEPLOYMENT.md.

server {
    listen 80;
    listen [::]:80;
    server_name saythis.hasn.me;

    # Certbot writes challenge files here to prove domain ownership.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy all traffic to the Go app while the certificate is being set up.
    location / {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }
}
